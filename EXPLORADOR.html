<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Skills | Jesús García Fernández</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js para renderizado de Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #F0F4FF;
            --accent-primary: #3D5AF1;
            --accent-secondary: #8093F1;
            --text-primary: #2D3142;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --card-bg: #FFFFFF;
            --card-border: #E5EBFB;
            --sidebar-width: 280px;
            --radius: 24px;
            --shadow-md: 0 10px 30px rgba(61, 90, 241, 0.08);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .main-logo {
            height: 45px;
            width: auto;
            transition: var(--transition);
        }

        .main-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4));
        }

        .header-left h1 {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header-left .v-tag {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .header-left a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .header-left a:hover { color: white; }

        .search-container {
            position: relative;
            width: 400px;
        }

        #skillSearch {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 0.8rem 1.2rem;
            border-radius: 99px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            font-weight: 600;
        }

        #skillSearch:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        main {
            display: grid;
            grid-template-columns: 310px 1fr;
            gap: 2rem;
            padding: 2rem;
            flex-grow: 1;
        }

        #sidebar {
            width: var(--sidebar-width);
            background: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            padding: 2rem 1.5rem;
            border-right: 1px solid var(--card-border);
            display: flex; flex-direction: column;
            z-index: 100;
        }

        .filter-title {
            font-size: 0.75rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.1em;
            margin: 2rem 0 1rem; font-weight: 700;
        }

        .category-list {
            list-style: none; display: flex; flex-direction: column; gap: 0.5rem;
            overflow-y: auto; padding-right: 5px;
        }

        .category-item {
            padding: 0.85rem 1.25rem; border-radius: 16px;
            cursor: pointer; font-size: 0.9rem;
            color: var(--text-secondary); transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent; font-weight: 500;
        }

        .category-item:hover { background: var(--bg-color); color: var(--accent-primary); }

        .category-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-color: var(--card-border);
        }

        .category-item.active {
            background: var(--bg-color);
            color: var(--accent-primary);
            font-weight: 700;
            border-color: rgba(61, 90, 241, 0.1);
        }

        .skill-count {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.08);
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-weight: 400;
        }

        /* Subcategorías */
        .subcat-list {
            margin-bottom: 0.8rem;
            list-style: none;
            padding-left: 1.2rem;
            border-left: 1px dashed rgba(255, 255, 255, 0.1);
            margin-left: 0.8rem;
            display: none;
        }

        .category-item.expanded + .subcat-list {
            display: block;
        }

        .subcat-item {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 6px;
            margin-bottom: 2px;
        }

        .subcat-item:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }

        .subcat-item.active {
            color: var(--accent-primary);
            font-weight: 600;
            background: rgba(59, 130, 246, 0.05);
        }

        .content-area {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
        }

        #activeFilterTitle {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .skill-card {
            background: #FFFFFF;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .skill-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 50px rgba(61, 90, 241, 0.12);
        }

        .skill-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: var(--transition);
        }

        .skill-card:hover::after {
            opacity: 1;
        }

        .skill-meta {
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .skill-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .skill-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-open {
            padding: 0.65rem 1.25rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 700;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-open:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-workflow {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: #f8fafc;
        }

        .btn-workflow:hover:not(:disabled) {
            background: rgba(30, 41, 59, 1);
            border-color: rgba(251, 191, 36, 0.8);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.15);
        }

        .btn-workflow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .skill-id {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 500;
        }

        footer {
            margin-top: auto;
            padding: 4rem 2rem;
            border-top: 1px solid var(--card-border);
            text-align: center;
            background: transparent;
        }

        .branding-text {
            color: #334155; /* Slate 700 - Gris oscuro */
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }

        .branding-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            background: rgba(59, 130, 246, 0.05);
            margin-left: 0.3rem;
        }

        .branding-link:hover {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* Modal / Visor de Skill */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-container {
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            background: #FFFFFF;
            border: none;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.2);
            transform: translateY(20px);
            transition: var(--transition);
        }

        .modal-overlay.active .modal-container {
            transform: translateY(0);
        }

        .modal-header {
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: white;
        }

        .btn-close-modal {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .modal-content {
            padding: 3rem;
            overflow-y: auto;
            color: var(--text-primary);
            line-height: 1.7;
            font-size: 14pt; /* Tamaño solicitado de 14pt */
        }

        /* Estilos Markdown dentro del modal */
        .markdown-body { font-size: 14pt; }
        .markdown-body h1 { font-size: 2.2rem; margin-bottom: 1.5rem; color: white; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem; }
        .markdown-body h2 { font-size: 1.6rem; margin-top: 2rem; margin-bottom: 1rem; color: var(--accent-primary); }
        .markdown-body h3 { font-size: 1.3rem; margin-top: 1.5rem; color: white; }
        .markdown-body p { margin-bottom: 1.2rem; font-size: 14pt; }
        .markdown-body p:has(strong), .markdown-body p strong { 
            font-size: 11pt !important;
            color: #3b82f6 !important; /* Un azul más suave y elegante */
        }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1.5rem; padding-left: 1.5rem; font-size: 14pt; }
        .markdown-body li { margin-bottom: 0.5rem; font-size: 14pt; }
        .markdown-body strong { font-weight: 700; }
        .markdown-body blockquote { 
            border-left: 4px solid var(--accent-primary);
            background: rgba(59, 130, 246, 0.05);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            border-radius: 0 12px 12px 0;
        }
        .markdown-body code {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: #0d1117;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid var(--card-border);
            color: #ffffff !important; /* Texto en blanco para el código */
        }
        .markdown-body pre code {
            color: #ffffff !important;
            background: transparent;
            padding: 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

        @media (max-width: 1024px) {
            main { grid-template-columns: 1fr; }
            aside { display: none; }
            .search-container { width: 100%; max-width: 300px; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skill-card {
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding:0 0.5rem;">
        <div style="width:36px; height:36px; background:var(--accent-primary); border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; box-shadow:0 8px 15px rgba(61, 90, 241, 0.25);">
            <i data-lucide="library"></i>
        </div>
        <h1 style="font-size:1.1rem; font-weight:800; color:var(--text-primary);">Explorador</h1>
    </div>
    
    <h3 class="filter-title" id="sideFilterTitle" data-i18n="filter_title">Sistemas y Categorías</h3>
    <ul class="category-list" id="categoryList">
        <li class="category-item active" data-category="all" onclick="selectCategory('all')">
            <span id="allSystemsText" data-i18n="all_systems">Todos los Sistemas</span>
        </li>
    </ul>
    
    <div style="margin-top:auto; padding:1.5rem; background:rgba(61, 90, 241, 0.05); border-radius:20px; border:1px solid rgba(61, 90, 241, 0.1);">
        <p style="font-size:0.7rem; color:var(--text-muted); line-height:1.4;">
            <span data-i18n="v_tag">V1 by</span> <a href="https://jesusgarciafernandez.com" target="_blank" style="color:var(--accent-primary); text-decoration:none; font-weight:700;">Jesús García Fernández</a>
        </p>
    </div>
</aside>

<main class="content-area">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div style="position:relative; width:450px;">
            <i data-lucide="search" style="position:absolute; left:1.25rem; top:50%; transform:translateY(-50%); color:var(--text-muted); width:18px;"></i>
            <input type="text" id="skillSearch" data-i18n-placeholder="search_placeholder" placeholder="Buscar habilidades..." onkeyup="handleSearch(event)" 
                   style="width:100%; background:white; border:1px solid var(--card-border); padding:1rem 1.5rem 1rem 3.5rem; border-radius:18px; outline:none; box-shadow:var(--shadow-md); font-weight:600;">
        </div>
        
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <div class="lang-selector">
                <select id="langSelect" onchange="changeLanguage(this.value)" style="background:white; border:1px solid var(--card-border); color:var(--text-primary); padding:0.6rem 1rem; border-radius:12px; font-size:0.85rem; cursor:pointer; font-weight:600; box-shadow:var(--shadow-sm);">
                    <option value="es">🇪🇸 ES</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="de">🇩🇪 DE</option>
                    <option value="zh">🇨🇳 ZH</option>
                    <option value="ja">🇯🇵 JP</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid-header">
        <div>
            <span style="font-size: 0.75rem; color: var(--accent-primary); font-weight: 700; text-transform: uppercase; margin-bottom: 0.2rem; display: block;" data-i18n="master_repo">Repositorio Maestro</span>
            <h2 id="activeFilterTitle" data-i18n="all_systems">Todos los Sistemas</h2>
        </div>
        <p class="branding-text" style="font-weight: 600;" id="resultsCount" data-i18n="loading">Cargando...</p>
    </div>
    
    <div class="skill-grid" id="skillGrid"></div>

    <footer style="margin-top:auto; padding:2rem 0; color:var(--text-muted); font-size:0.85rem; text-align:center; border-top:1px solid var(--card-border);">
        <span data-i18n="footer_text">Ingeniería de Conocimiento por</span>
        <a href="https://jesusgarciafernandez.com" target="_blank" style="color:var(--accent-primary); text-decoration:none; font-weight:700;">Jesús García Fernández</a>
    </footer>
</main>

<!-- Modal / Visor de Contenido -->
<div class="modal-overlay" id="skillModal">
    <div class="modal-container">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle" data-i18n="modal_detail">Detalle de Skill</span>
            <button class="btn-close-modal" onclick="closeSkill()">✕</button>
        </div>
        <div class="modal-content markdown-body" id="modalBody">
            <!-- El contenido Markdown se inyectará aquí -->
        </div>
    </div>
</div>

    function updateUI(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (translations[lang] && translations[lang][key]) {
                el.innerHTML = translations[lang][key];
            }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.dataset.i18nPlaceholder;
            if (translations[lang] && translations[lang][key]) {
                el.placeholder = translations[lang][key];
            }
        });
        document.getElementById('langSelect').value = lang;
        document.documentElement.lang = lang;
        
        document.getElementById('sideFilterTitle').innerText = translations[lang].filter_title;
        document.getElementById('allSystemsText').innerText = translations[lang].all_systems;

        // Iniciar iconos Lucide
        if (window.lucide) lucide.createIcons({
            attrs: {
                'stroke-width': 2.5,
                'stroke-linecap': 'round',
                'stroke-linejoin': 'round'
            }
        });
        
        if (typeof skillsData !== 'undefined') {
            renderCategories();
            selectCategory('all');
        }
    }

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('antigravity_lang', lang);
        updateUI(lang);
    }

    function loadSkills() {
        if (typeof skillsData === 'undefined') {
            console.error('Error: INDEX.js no se ha cargado correctamente.');
            const t = translations[currentLang] || translations.es;
            document.getElementById('skillGrid').innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem; background: rgba(255,0,0,0.05); border-radius: 20px; border: 1px dashed rgba(255,0,0,0.2);">
                    <h3 style="color: #ff4444; margin-bottom: 1rem;">${t.error_load_title}</h3>
                    <p style="color: #94a3b8;">${t.error_load_desc}</p>
                </div>`;
            return;
        }
        
        processData();
        updateUI(currentLang);
        renderCategories();
        renderSkills('all');
        document.getElementById('totalCount').innerText = skillsData.length;
    }

    function processData() {
        categories = {};
        skillsData.forEach(skill => {
            // Normalizar a NFC para evitar problemas con tildes combinadas (NFD)
            const cat = (skill.category || 'Sin Categoría').normalize('NFC');
            const sub = (skill.subcategory || 'Sin Subcategoría').normalize('NFC');
            
            // Actualizar skill.category y skill.subcategory para que el renderizado use los mismos valores
            skill.category = cat;
            skill.subcategory = sub;

            if (!categories[cat]) {
                categories[cat] = {
                    total: 0,
                    subcategories: {}
                };
            }
            categories[cat].total++;
            
            if (!categories[cat].subcategories[sub]) {
                categories[cat].subcategories[sub] = 0;
            }
            categories[cat].subcategories[sub]++;
        });
    }

    function renderCategories() {
        const list = document.getElementById('categoryList');
        const items = list.querySelectorAll('.category-item:not([data-category="all"]), .subcat-list');
        items.forEach(item => item.remove());

        const sortedCats = Object.keys(categories).sort();
        
        sortedCats.forEach(cat => {
            const displayCat = translations[currentLang].categories[cat] || cat;
            // Contenedor de categoría principal
            const li = document.createElement('li');
            li.className = 'category-item';
            li.dataset.category = cat;
            li.innerHTML = `<span>${displayCat}</span> <span class="skill-count">${categories[cat].total}</span>`;
            li.onclick = () => selectCategory(cat);
            list.appendChild(li);

            // Sublista para subcategorías
            const sublist = document.createElement('ul');
            sublist.className = 'subcat-list';
            sublist.id = `subcat-${cat.replace(/\s+/g, '-')}`;
            
            const sortedSubCats = Object.keys(categories[cat].subcategories).sort();
            sortedSubCats.forEach(sub => {
                const subLi = document.createElement('li');
                subLi.className = 'subcat-item';
                subLi.dataset.category = cat;
                subLi.dataset.subcategory = sub;
                const displaySub = translations[currentLang].subcategories ? (translations[currentLang].subcategories[sub] || sub) : sub;
                subLi.innerHTML = `${displaySub} (${categories[cat].subcategories[sub]})`;
                subLi.onclick = (e) => {
                    e.stopPropagation();
                    selectSubcategory(cat, sub);
                };
                sublist.appendChild(subLi);
            });
            list.appendChild(sublist);
        });
    }

    let searchTimeout;
    const BATCH_SIZE = 30;

    function handleSearch(event) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const query = document.getElementById('searchInput').value;
            const activeCategory = document.querySelector('.category-item.active')?.dataset.category || 'all';
            const activeSub = document.querySelector('.subcat-item.active')?.dataset.subcategory || 'all';
            renderSkills(activeCategory, query, activeSub);
        }, 300);
    }

    function renderSkills(categoryFilter = 'all', searchQuery = '', subcatFilter = 'all') {
        const grid = document.getElementById('skillGrid');
        grid.innerHTML = '';
        
        const filtered = skillsData.filter(skill => {
            const matchesCat = categoryFilter === 'all' || skill.category === categoryFilter;
            const matchesSub = subcatFilter === 'all' || skill.subcategory === subcatFilter;
            const searchLower = searchQuery.toLowerCase();
            const matchesSearch = skill.name.toLowerCase().includes(searchLower) || 
                                 skill.description.toLowerCase().includes(searchLower) ||
                                 skill.subcategory.toLowerCase().includes(searchLower);
            return matchesCat && matchesSub && matchesSearch;
        });

        let index = 0;
        function renderBatch() {
            const end = Math.min(index + BATCH_SIZE, filtered.length);
            const batch = filtered.slice(index, end);
            const fragment = document.createDocumentFragment();

            batch.forEach((skill, i) => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.style.animationDelay = `${(i % 15) * 0.05}s`;
                
                const catLabel = translations[currentLang].categories[skill.category] || skill.category;
                const subLabel = translations[currentLang].subcategories[skill.subcategory] || skill.subcategory;

                // Mapeo de iconos
                const iconsMap = {
                    "1. Marketing Digital": "trending-up", "2. Generación de Contenido": "edit-3",
                    "3. Gestión de Leads y CRM": "users", "13. Desarrollo y Tecnología": "code"
                };
                const icon = iconsMap[skill.category] || "book-open";

                card.innerHTML = `
                    <div>
                        <div class="skill-meta">
                            <i data-lucide="${icon}" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;"></i>
                            ${catLabel} › ${subLabel}
                        </div>
                        <h3 class="skill-title">${skill.name}</h3>
                        <p class="skill-desc">${skill.description}</p>
                    </div>
                    <div class="skill-footer">
                        <span class="skill-id">${translations[currentLang].id_prefix}${String(skill.id).padStart(3, '0')}</span>
                        <div class="btn-group">
                            <button onclick="openSkill(${skill.id}, 'skill')" class="btn-open">
                                <i data-lucide="file-text" style="width:16px;height:16px;margin-right:6px;"></i>
                                ${translations[currentLang].btn_open_skill}
                            </button>
                            ${skill.workflow_content ? `
                                <button onclick="openSkill(${skill.id}, 'workflow')" class="btn-open btn-workflow" title="Flujo Operativo N8N / Python">
                                    <i data-lucide="zap" style="width:16px;height:16px;margin-right:6px;color:#fbbf24;"></i>
                                    ${translations[currentLang].btn_open_workflow}
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });

            grid.appendChild(fragment);
            index = end;

            if (index < filtered.length) {
                requestAnimationFrame(renderBatch);
            } else {
                if (window.lucide) lucide.createIcons({
                    attrs: {
                        'stroke-width': 2.5,
                        'stroke-linecap': 'round',
                        'stroke-linejoin': 'round'
                    }
                });
            }
        }

        renderBatch();
        document.getElementById('resultsCount').innerText = `${filtered.length} ${translations[currentLang].units_available}`;
    }

    function selectCategory(cat) {
        document.querySelectorAll('.category-item, .subcat-item').forEach(el => el.classList.remove('active', 'expanded'));
        const target = cat === 'all' ? document.querySelector('[data-category="all"]') : document.querySelector(`[data-category="${cat}"]`);
        if (target) {
            target.classList.add('active');
            if (cat !== 'all') target.classList.add('expanded');
        }
        
        const displayCat = cat === 'all' ? translations[currentLang].all_systems : (translations[currentLang].categories[cat] || cat);
        document.getElementById('activeFilterTitle').innerText = displayCat;
        renderSkills(cat, document.getElementById('skillSearch').value);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectSubcategory(cat, sub) {
        document.querySelectorAll('.subcat-item').forEach(el => el.classList.remove('active'));
        const target = document.querySelector(`.subcat-item[data-subcategory="${sub}"][data-category="${cat}"]`);
        if (target) target.classList.add('active');

        const displayCat = translations[currentLang].categories[cat] || cat;
        const displaySub = translations[currentLang].subcategories ? (translations[currentLang].subcategories[sub] || sub) : sub;
        document.getElementById('activeFilterTitle').innerText = `${displayCat} › ${displaySub}`;
        renderSkills(cat, document.getElementById('skillSearch').value, sub);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Funciones del Modal
    function openSkill(id, type = 'skill') {
        const skill = skillsData.find(s => s.id === id);
        if (!skill) return;

        const modal = document.getElementById('skillModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        const isWorkflow = type === 'workflow';
        const rawContent = isWorkflow ? skill.workflow_content : skill.content;
        
        modalTitle.innerText = isWorkflow ? `${skill.name} - Workflow` : skill.name;
        
        // Convertimos Markdown a HTML usando marked.js
        modalBody.innerHTML = marked.parse(rawContent || translations[currentLang].no_content);
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // Bloquear scroll del fondo
    }

    function closeSkill() {
        const modal = document.getElementById('skillModal');
        modal.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    // Cerrar modal al hacer clic fuera o presionar ESC
    window.onclick = (event) => {
        const modal = document.getElementById('skillModal');
        if (event.target == modal) closeSkill();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") closeSkill();
    });

    document.getElementById('skillSearch').oninput = (e) => {
        const activeCatEl = document.querySelector('.category-item.active');
        const activeSubEl = document.querySelector('.subcat-item.active');
        
        const activeCat = activeCatEl ? activeCatEl.dataset.category : 'all';
        const activeSub = activeSubEl ? activeSubEl.dataset.subcategory : 'all';
        
        renderSkills(activeCat, e.target.value, activeSub);
    };

    window.onload = loadSkills;
</script>
</body>
</html>
